<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>US Data Center Intelligence</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0a0f18;--panel:#0f1824;--card:#131f2e;--card2:#162233;
  --line:#1c2e42;--line2:#243548;--dim:#3d5a78;--mid:#5a7a9a;
  --pale:#8aaabb;--text:#cde4f5;--bright:#eaf4fc;
  --cyan:#00ccee;--cyanD:rgba(0,204,238,.13);
  --orange:#ff6e3a;--orangeD:rgba(255,110,58,.13);
  --green:#3dffc0;--greenD:rgba(61,255,192,.13);
  --yellow:#ffd060;--yellowD:rgba(255,208,96,.13);
  --purple:#c07aff;--purpleD:rgba(192,122,255,.13);
}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh}

/* TOPBAR */
.topbar{background:var(--panel);border-bottom:1px solid var(--line);padding:0 28px;display:flex;align-items:center;gap:20px;height:58px;position:sticky;top:0;z-index:100;flex-wrap:wrap}
.brand{display:flex;align-items:center;gap:10px;flex-shrink:0}
.brand-icon{width:32px;height:32px;border-radius:8px;background:linear-gradient(135deg,var(--cyan),var(--orange));display:flex;align-items:center;justify-content:center;font-size:16px;box-shadow:0 0 14px rgba(0,204,238,.25)}
.brand h1{font-size:15px;font-weight:700;letter-spacing:.04em;color:var(--bright)}
.brand p{font-size:9px;color:var(--cyan);letter-spacing:.12em;margin-top:1px}
.kpis{display:flex;gap:0;margin-left:12px}
.kpi{padding:0 16px;border-left:1px solid var(--line);text-align:center}
.kv{font-size:16px;font-weight:700;color:var(--cyan);font-variant-numeric:tabular-nums}
.kl{font-size:9px;color:var(--mid);text-transform:uppercase;letter-spacing:.08em;margin-top:1px}
.topbar-right{margin-left:auto;display:flex;gap:6px}
.vbtn{padding:5px 12px;border-radius:6px;border:1px solid var(--line2);background:transparent;color:var(--mid);font-size:11px;cursor:pointer;transition:all .15s;font-family:inherit}
.vbtn:hover{color:var(--text);border-color:var(--pale)}
.vbtn.on{background:var(--card2);color:var(--cyan);border-color:var(--cyan)}

/* FILTERS */
.filters{background:var(--panel);border-bottom:1px solid var(--line);padding:14px 28px;display:flex;flex-direction:column;gap:10px}
.frow{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.flbl{font-size:10px;color:var(--dim);text-transform:uppercase;letter-spacing:.1em;min-width:70px;flex-shrink:0}
.pills{display:flex;gap:4px;flex-wrap:wrap}
.pill{padding:4px 12px;border-radius:100px;border:1px solid var(--line2);background:transparent;color:var(--mid);font-size:11px;cursor:pointer;transition:all .13s;font-family:inherit;white-space:nowrap}
.pill:hover{border-color:var(--pale);color:var(--text)}
.pill.p-all{border-color:var(--cyan);color:var(--cyan);background:var(--cyanD)}
.pill.p-op{border-color:var(--green);color:var(--green);background:var(--greenD)}
.pill.p-con{border-color:var(--orange);color:var(--orange);background:var(--orangeD)}
.pill.p-pla{border-color:var(--yellow);color:var(--yellow);background:var(--yellowD)}
.pill.p-ann{border-color:var(--purple);color:var(--purple);background:var(--purpleD)}
.fsep{width:1px;height:24px;background:var(--line);margin:0 4px;flex-shrink:0}
.search-row{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-left:auto}
.sinput{padding:7px 12px;background:var(--card);border:1px solid var(--line2);border-radius:6px;color:var(--text);font-size:12px;outline:none;font-family:inherit;width:210px;transition:border-color .15s}
.sinput:focus{border-color:var(--cyan)}
.sinput::placeholder{color:var(--dim)}
.sselect{padding:6px 10px;background:var(--card);border:1px solid var(--line2);border-radius:6px;color:var(--mid);font-size:11px;outline:none;cursor:pointer;font-family:inherit;transition:border-color .15s}
.sselect:focus{border-color:var(--cyan)}

/* RESULTS BAR */
.rbar{padding:9px 28px;display:flex;align-items:center;gap:10px;border-bottom:1px solid var(--line);font-size:11px;color:var(--mid);flex-wrap:wrap}
.rcount{color:var(--cyan);font-weight:700}
.clearbtn{margin-left:auto;background:none;border:1px solid var(--line2);border-radius:100px;color:var(--mid);font-size:10px;cursor:pointer;padding:3px 10px;font-family:inherit;transition:all .13s}
.clearbtn:hover{border-color:var(--orange);color:var(--orange)}

/* MAIN */
.main{padding:20px 28px 40px}

/* GRID */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:14px}

/* CARD */
.site-card{background:var(--card);border:1px solid var(--line);border-radius:14px;overflow:hidden;cursor:pointer;transition:border-color .15s,box-shadow .15s,transform .15s}
.site-card:hover{border-color:var(--pale);transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,.3)}
.site-card.open{border-color:var(--cyan);box-shadow:0 0 20px rgba(0,204,238,.12)}
.acc{height:3px}
.cbody{padding:15px 17px}
.ctop{display:flex;justify-content:space-between;align-items:flex-start;gap:8px;margin-bottom:7px}
.cname{font-size:13px;font-weight:700;color:var(--bright);line-height:1.35;flex:1}
.sbadge{font-size:9px;padding:3px 9px;border-radius:100px;border:1px solid;white-space:nowrap;flex-shrink:0;font-weight:600}
.cdev{font-size:11px;color:var(--mid);margin-bottom:4px}
.cloc{font-size:10px;color:var(--dim);margin-bottom:13px}
.mets{display:grid;grid-template-columns:repeat(4,1fr);gap:1px;background:var(--line);border:1px solid var(--line);border-radius:8px;overflow:hidden;margin-bottom:12px}
.met{background:var(--card2);padding:9px 7px;text-align:center}
.mv{font-size:12px;font-weight:700;line-height:1;margin-bottom:3px}
.mk{font-size:8px;color:var(--dim);text-transform:uppercase;letter-spacing:.07em}

/* EXPANDED DETAIL */
.detail{max-height:0;overflow:hidden;transition:max-height .3s ease,opacity .3s ease;opacity:0}
.detail.open{max-height:700px;opacity:1}
.dinn{border-top:1px solid var(--line);padding:13px 17px 4px}
.drows{display:grid;grid-template-columns:1fr 1fr;gap:7px 16px;margin-bottom:11px}
.drow{display:flex;flex-direction:column;gap:2px}
.dkey{font-size:8px;color:var(--dim);text-transform:uppercase;letter-spacing:.09em}
.dval{font-size:11px;color:var(--pale);font-weight:500}
.dnotes{font-size:11px;line-height:1.7;color:var(--mid);padding:10px 12px;background:var(--panel);border-radius:7px;border-left:2px solid var(--cyan);margin-bottom:11px}
.sbar-wrap{margin-bottom:13px}
.sbar-lbl{display:flex;justify-content:space-between;font-size:9px;color:var(--dim);margin-bottom:4px}
.sbar-track{height:3px;background:var(--line);border-radius:3px;overflow:hidden}
.sbar-fill{height:100%;border-radius:3px;transition:width .5s ease}
.togglebtn{width:100%;padding:8px;border:none;border-top:1px solid var(--line);background:var(--card2);color:var(--dim);font-size:9px;text-transform:uppercase;letter-spacing:.1em;cursor:pointer;font-family:inherit;display:flex;align-items:center;justify-content:center;gap:5px;transition:all .15s}
.togglebtn:hover{color:var(--cyan)}
.arr{display:inline-block;transition:transform .22s}
.arr.up{transform:rotate(180deg)}

/* TABLE */
.twrap{border:1px solid var(--line);border-radius:12px;overflow:hidden}
table{width:100%;border-collapse:collapse;font-size:11px}
thead tr{background:var(--panel);border-bottom:1px solid var(--line)}
th{padding:10px 13px;font-size:9px;font-weight:600;text-transform:uppercase;letter-spacing:.1em;color:var(--dim);text-align:left;cursor:pointer;white-space:nowrap;user-select:none;transition:color .13s}
th:hover{color:var(--cyan)}
th.tsort{color:var(--cyan)}
tbody tr{border-bottom:1px solid var(--line);transition:background .12s;cursor:pointer}
tbody tr:last-child{border-bottom:none}
tbody tr:hover{background:var(--card2)}
td{padding:10px 13px;vertical-align:middle;color:var(--mid)}
td.tname{font-weight:700;color:var(--bright);font-size:12px;max-width:220px}
td.tmono{font-size:10px}

/* EMPTY */
.empty{padding:60px;text-align:center;color:var(--dim);font-size:13px;grid-column:1/-1}

@media(max-width:640px){
  .topbar{padding:0 14px;height:auto;padding-top:10px;padding-bottom:10px}
  .kpis{display:none}
  .filters{padding:12px 14px}
  .rbar{padding:8px 14px}
  .main{padding:14px 14px 32px}
  .grid{grid-template-columns:1fr}
  .mets{grid-template-columns:repeat(2,1fr)}
  .drows{grid-template-columns:1fr}
}
</style>
</head>

</div>

<!-- RESULTS BAR -->

<!-- MAIN -->

  </div>
</div>

{id:25,name:"Energy Storage Solutions – Rocky Mount",dev:"Energy Storage Solutions",dg:"Other",loc:"Rocky Mount, NC",region:"South",mw:900,mwL:"900 MW",acres:300,inv:"$19.2B",invN:19.2,status:"planned",sqft:"N/A",bldgs:"TBD",jobs:"TBD",energy:"Grid + Battery Storage",year:2026,notes:"900 MW campus. Construction expected Q1 2026. A twin project is also planned for Fayetteville, NC."},
{id:26,name:"Compass Meridian – Mississippi",dev:"Compass Datacenters",dg:"Other",loc:"Lauderdale Co., MS",region:"South",mw:800,mwL:"~800 MW",acres:500,inv:"$10B",invN:10,status:"planned",sqft:"2,000,000",bldgs:"8",jobs:"TBD",energy:"Grid",year:2027,notes:"Eight data center buildings each spanning 250,000 sq ft. $10B investment in Lauderdale County."},
{id:27,name:"Vantage – Fredericksburg, Virginia",dev:"Vantage Data Centers",dg:"Other",loc:"Fredericksburg, VA",region:"South",mw:192,mwL:"192 MW",acres:100,inv:"$2B",invN:2,status:"construction",sqft:"N/A",bldgs:"TBD",jobs:"TBD",energy:"Grid",year:2026,notes:"New 192 MW campus bringing Vantage's Virginia statewide capacity to 782 MW."},
{id:28,name:"CleanArc VA1 – Caroline Co., Virginia",dev:"CleanArc Data Centers",dg:"Other",loc:"Caroline County, VA",region:"South",mw:900,mwL:"900 MW",acres:450,inv:"Multi-billion",invN:3,status:"construction",sqft:"N/A",bldgs:"TBD",jobs:"TBD",energy:"Grid",year:2027,notes:"Flagship campus providing 900 MW grid capacity; first 300 MW available early 2027."}
];

var SC={
  operational:{col:"#3dffc0",lbl:"Operational"},
  construction:{col:"#ff6e3a",lbl:"Construction"},
  planned:{col:"#ffd060",lbl:"Planned"},
  announced:{col:"#c07aff",lbl:"Announced"}
};

var F={status:"all",size:"all",dev:"all",region:"all"};
var sortKey="mw-d",searchQ="",view="grid",expanded=new Set();
var tCol="mw",tDir=-1;

function getFiltered(){
  var q=searchQ.toLowerCase();
  return DATA.filter(function(s){
    if(F.status!=="all"&&s.status!==F.status)return false;
    if(F.size==="mega"&&s.mw<1000)return false;
    if(F.size==="large"&&(s.mw<500||s.mw>=1000))return false;
    if(F.size==="mid"&&(s.mw<200||s.mw>=500))return false;
    if(F.size==="small"&&s.mw>=200)return false;
    if(F.dev!=="all"&&s.dg!==F.dev)return false;
    if(F.region!=="all"&&s.region!==F.region)return false;
    if(q&&!s.name.toLowerCase().includes(q)&&!s.dev.toLowerCase().includes(q)&&!s.loc.toLowerCase().includes(q))return false;
    return true;
  });
}

function getSorted(arr){
  return arr.slice().sort(function(a,b){
    if(sortKey==="mw-d")return b.mw-a.mw;
    if(sortKey==="mw-a")return a.mw-b.mw;
    if(sortKey==="inv-d")return b.invN-a.invN;
    if(sortKey==="ac-d")return b.acres-a.acres;
    if(sortKey==="yr-a")return a.year-b.year;
    if(sortKey==="nm-a")return a.name.localeCompare(b.name);
    return 0;
  });
}

function render(){
  var arr=getSorted(getFiltered());
  document.getElementById("r-count").textContent=arr.length;
  document.getElementById("kv-sites").textContent=arr.length;
  var hasF=F.status!=="all"||F.size!=="all"||F.dev!=="all"||F.region!=="all"||searchQ;
  document.getElementById("clearbtn").style.display=hasF?"inline-block":"none";
  if(view==="grid")renderGrid(arr);
  else renderTable(arr);
}

function renderGrid(arr){
  var g=document.getElementById("grid");
  if(!arr.length){g.innerHTML='<div class="empty">No sites match your filters. Try clearing some filters above.</div>';return;}
  g.innerHTML=arr.map(function(s){
    var sc=SC[s.status];
    var col=sc.col;
    var pct=Math.min(100,Math.round(s.mw/7500*100));
    var isOpen=expanded.has(s.id);
    var grad="linear-gradient(90deg,"+col+","+col+"66)";
    return '<div class="site-card'+(isOpen?" open":"")+'">'+
      '<div class="acc" style="background:'+grad+'"></div>'+
      '<div class="cbody">'+
        '<div class="ctop">'+
          '<div class="cname">'+s.name+'</div>'+
          '<div class="sbadge" style="border-color:'+col+';color:'+col+';background:'+col+'22">'+sc.lbl+'</div>'+
        '</div>'+
        '<div class="cdev">'+s.dev+'</div>'+
        '<div class="cloc">&#128205; '+s.loc+' &nbsp;&#183;&nbsp; '+s.region+'</div>'+
        '<div class="mets">'+
          '<div class="met"><div class="mv" style="color:'+col+'">'+s.mwL+'</div><div class="mk">Capacity</div></div>'+
          '<div class="met"><div class="mv" style="color:#ffd060">'+s.inv+'</div><div class="mk">Investment</div></div>'+
          '<div class="met"><div class="mv" style="color:#3dffc0">'+s.acres.toLocaleString()+'</div><div class="mk">Acres</div></div>'+
          '<div class="met"><div class="mv" style="color:#8aaabb">'+s.year+'</div><div class="mk">Target Yr</div></div>'+
        '</div>'+
        '<div class="detail'+(isOpen?" open":"")+'">'+
          '<div class="dinn">'+
            '<div class="drows">'+
              '<div class="drow"><div class="dkey">Developer</div><div class="dval">'+s.dev+'</div></div>'+
              '<div class="drow"><div class="dkey">Sq Footage</div><div class="dval">'+(s.sqft!=="N/A"?s.sqft:"—")+'</div></div>'+
              '<div class="drow"><div class="dkey">Buildings</div><div class="dval">'+s.bldgs+'</div></div>'+
              '<div class="drow"><div class="dkey">Jobs</div><div class="dval">'+s.jobs+'</div></div>'+
              '<div class="drow"><div class="dkey">Energy Source</div><div class="dval">'+s.energy+'</div></div>'+
              '<div class="drow"><div class="dkey">Region</div><div class="dval">'+s.region+'</div></div>'+
            '</div>'+
            '<div class="sbar-wrap">'+
              '<div class="sbar-lbl"><span>MW Scale vs. largest site (7.5 GW)</span><span>'+pct+'%</span></div>'+
              '<div class="sbar-track"><div class="sbar-fill" style="width:'+pct+'%;background:linear-gradient(90deg,'+col+',#00ccee)"></div></div>'+
            '</div>'+
            '<div class="dnotes">'+s.notes+'</div>'+
          '</div>'+
        '</div>'+
      '</div>'+
      '<button class="togglebtn'+(isOpen?" open":"")+('" onclick="toggle('+s.id+',event)">')+
        (isOpen?"Hide details":"Show details")+' <span class="arr'+(isOpen?" up":"")+'">&#9660;</span>'+
      '</button>'+
    '</div>';
  }).join("");
}

function toggle(id,e){
  if(e)e.stopPropagation();
  if(expanded.has(id))expanded.delete(id);
  else expanded.add(id);
  render();
}

function renderTable(arr){
  var cols=[
    {k:"name",l:"Project"},
    {k:"dev",l:"Developer"},
    {k:"loc",l:"Location"},
    {k:"mw",l:"Capacity"},
    {k:"inv",l:"Investment"},
    {k:"acres",l:"Acres"},
    {k:"status",l:"Status"},
    {k:"year",l:"Year"}
  ];
  document.getElementById("thead").innerHTML="<tr>"+cols.map(function(c){
    var isSorted=tCol===c.k;
    var arrow=isSorted?(tDir===1?"&#8593;":"&#8595;"):"&#8645;";
    return '<th class="'+(isSorted?"tsort":"")+'" onclick="tblSort(\''+c.k+'\')">'+c.l+' <span>'+arrow+'</span></th>';
  }).join("")+"</tr>";

  var sorted=arr.slice().sort(function(a,b){
    var av=a[tCol],bv=b[tCol];
    if(typeof av==="number")return(av-bv)*tDir;
    return String(av).localeCompare(String(bv))*tDir;
  });

  if(!sorted.length){
    document.getElementById("tbody").innerHTML='<tr><td colspan="8" style="text-align:center;padding:48px;color:#3d5a78">No sites match your filters.</td></tr>';
    return;
  }

  document.getElementById("tbody").innerHTML=sorted.map(function(s){
    var sc=SC[s.status];
    var col=sc.col;
    return '<tr>'+
      '<td class="tname">'+s.name+'</td>'+
      '<td style="font-size:11px">'+s.dev+'</td>'+
      '<td style="font-size:10px;color:#5a7a9a;white-space:nowrap">'+s.loc+'</td>'+
      '<td class="tmono" style="color:'+col+';font-weight:700">'+s.mwL+'</td>'+
      '<td class="tmono">'+s.inv+'</td>'+
      '<td class="tmono">'+s.acres.toLocaleString()+'</td>'+
      '<td><span class="sbadge" style="border-color:'+col+';color:'+col+';background:'+col+'22;font-size:9px;padding:2px 8px;border-radius:100px;border:1px solid;white-space:nowrap">'+sc.lbl+'</span></td>'+
      '<td class="tmono" style="color:#5a7a9a">'+s.year+'</td>'+
    '</tr>';
  }).join("");
}

function tblSort(col){
  if(tCol===col)tDir*=-1;
  else{tCol=col;tDir=-1;}
  renderTable(getSorted(getFiltered()));
}

function setView(v){
  view=v;
  document.getElementById("vb-grid").className="vbtn"+(v==="grid"?" on":"");
  document.getElementById("vb-tbl").className="vbtn"+(v==="tbl"?" on":"");
  document.getElementById("grid").style.display=v==="grid"?"":"none";
  document.getElementById("twrap").style.display=v==="tbl"?"":"none";
  render();
}

function clearAll(){
  F={status:"all",size:"all",dev:"all",region:"all"};
  document.getElementById("search").value="";
  searchQ="";
  document.getElementById("sort-sel").value="mw-d";
  sortKey="mw-d";
  document.querySelectorAll(".pill").forEach(function(p){
    p.className="pill"+(p.dataset.v==="all"?" p-all":"");
  });
  render();
}

// Pill clicks
document.querySelectorAll(".pill").forEach(function(btn){
  btn.addEventListener("click",function(){
    var g=this.dataset.g,v=this.dataset.v;
    F[g]=v;
    document.querySelectorAll('.pill[data-g="'+g+'"]').forEach(function(p){
      p.className="pill";
    });
    var cls="p-all";
    if(v==="operational")cls="p-op";
    else if(v==="construction")cls="p-con";
    else if(v==="planned")cls="p-pla";
    else if(v==="announced")cls="p-ann";
    this.className="pill "+cls;
    render();
  });
});

document.getElementById("search").addEventListener("input",function(){
  searchQ=this.value;render();
});
document.getElementById("sort-sel").addEventListener("change",function(){
  sortKey=this.value;render();
});

render();
</script>
</body>
</html>
